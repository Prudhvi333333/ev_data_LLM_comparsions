project_name: benchmark_v3

paths:
  kb: data/kb/GNEM - Auto Landscape Lat Long Updated.xlsx
  questions: data/Human validated 50 questions.xlsx
  ontology: config/ontology_v3.yaml
  output_root: outputs
  generation: outputs/generation
  evaluation: outputs/evaluation
  accuracy_evaluation: outputs/accuracy_evaluation
  reports: outputs/reports
  manifests: outputs/manifests
  indexes: outputs/indexes
  logs: outputs/logs
  unused: unused
  regression_subset: data/regression/v3_regression_subset.json

models:
  qwen:
    provider: ollama
    model_name: qwen2.5:14b
    endpoint: http://127.0.0.1:11434/api/generate
    temperature: 0.1
    max_tokens: 512
    timeout_seconds: 180
    retries: 4
    retry_backoff_seconds: 2.0
    max_retry_backoff_seconds: 60.0
    num_ctx: 4096
    top_p: 0.9
    repeat_penalty: 1.05
  gemma:
    provider: ollama
    model_name: gemma3:27b
    endpoint: http://127.0.0.1:11434/api/generate
    temperature: 0.1
    max_tokens: 512
    timeout_seconds: 180
    num_ctx: 4096
    top_p: 0.9
    repeat_penalty: 1.05
  gemini:
    provider: gemini
    model_name: gemini-2.5-flash
    temperature: 0.1
    max_tokens: 512
    timeout_seconds: 180
    retries: 5
    retry_backoff_seconds: 3.0
    max_retry_backoff_seconds: 120.0
    top_p: 0.9
  chatgpt:
    provider: openai
    model_name: gpt-4o-mini
    endpoint: https://api.openai.com/v1/chat/completions
    temperature: 0.1
    max_tokens: 512
    timeout_seconds: 180
    retries: 5
    retry_backoff_seconds: 3.0
    max_retry_backoff_seconds: 120.0
    top_p: 0.9
  qwen25_32b:
    provider: ollama
    model_name: qwen2.5:32b
    endpoint: http://127.0.0.1:11434/api/generate
    temperature: 0.1
    max_tokens: 512
    timeout_seconds: 180
    num_ctx: 4096
    top_p: 0.9
    repeat_penalty: 1.05
  qwen35_35b_a3b:
    provider: ollama
    model_name: qwen3.5:35b-a3b
    endpoint: http://127.0.0.1:11434/api/generate
    temperature: 0.1
    max_tokens: 512
    timeout_seconds: 180
    num_ctx: 4096
    top_p: 0.9
    repeat_penalty: 1.05
  mistral_small32_24b:
    provider: ollama
    model_name: mistral-small3.2:24b
    endpoint: http://127.0.0.1:11434/api/generate
    temperature: 0.1
    max_tokens: 512
    timeout_seconds: 180
    num_ctx: 4096
    top_p: 0.9
    repeat_penalty: 1.05

retrieval:
  embedding_model: sentence-transformers/all-mpnet-base-v2
  reranker_model: cross-encoder/ms-marco-MiniLM-L-6-v2
  allow_remote_model_downloads: false
  allow_hash_embedding_fallback: true
  dense_dimension: 2048
  top_k_dense: 24
  top_k_sparse: 24
  top_k_fused: 18
  top_k_reranked: 8
  max_context_tokens: 1800
  rrf_k: 60
  chunk_overlap: 0

structured_ops:
  enabled: true
  top_n_default: 5
  max_evidence_rows: 25
  supplier_only_default: true
  employment_field: employment
  ontology_match_mode: any

prompts:
  version: v3
  rag_not_found_text: Not found in provided context.
  norag_not_found_text: I cannot determine the exact dataset-specific answer from closed-book knowledge alone.
  answer_style: plain_text

evaluation:
  enabled_metrics:
    - faithfulness
    - response_relevancy
    - context_precision
    - context_recall
    - answer_correctness
  provider: ollama
  llm_model: kimi-k2.5:cloud
  embeddings_provider: huggingface
  embeddings_model: sentence-transformers/all-mpnet-base-v2
  endpoint: http://127.0.0.1:11434
  timeout_seconds: 180
  retries: 2
  raise_exceptions: false
  batch_size: 1
  allow_optional_metrics: true

accuracy_evaluation:
  provider: ollama
  judge_model: kimi-k2.5:cloud
  fallback_judge_models:
    - qwen2.5:14b
  endpoint: http://127.0.0.1:11434/api/generate
  temperature: 0.0
  max_tokens: 220
  timeout_seconds: 180
  retries: 4
  retry_backoff_seconds: 2.0
  max_retry_backoff_seconds: 45.0
  min_seconds_between_requests: 0.35
  fail_open_with_zero: true

runtime:
  resume: true
  write_excel: true
  write_csv: true
  fail_fast: false
  random_seed: 7

api_keys:
  gemini: ${GEMINI_API_KEY}
  chatgpt: ${CHATGPT_API_KEY}

question_subsets:
  regression_v3: data/regression/v3_regression_subset.json
