models:
  qwen: "qwen2.5:14b"
  gemma: "gemma3:27b"
  gemini: "gemini-2.5-flash-preview-05-20"

api_keys:
  gemini: "local-dev-gemini-key"
  openrouter: "REPLACE_WITH_OPENROUTER_KEY"

paths:
  kb: "data/kb/GNEM - Auto Landscape Lat Long Updated.xlsx"
  questions: "data/Human validated 50 questions.xlsx"
  output: "outputs/reports/"
  chroma: "outputs/chroma_db/"
  logs: "outputs/logs/"
  progress: "outputs/progress/"

retrieval:
  top_k: 6
  candidate_pool: 30
  chunk_overlap: 1
  embedding_model: "sentence-transformers/all-mpnet-base-v2"
  reranker_model: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  max_context_tokens: 900

generation:
  ollama_endpoint: "http://127.0.0.1:11435/api/generate"
  temperature: 0.1
  max_tokens: 512
  timeout_seconds: 120
  num_ctx: 3072
  top_p: 0.9
  repeat_penalty: 1.05
  allow_local_fallback: true

evaluation:
  provider: "ollama"
  judge_model: "kimi-k2.5:cloud"
  ollama_endpoint: "http://127.0.0.1:11435/api/generate"
  timeout_seconds: 120
  weights:
    faithfulness: 0.25
    answer_relevancy: 0.20
    context_precision: 0.20
    context_recall: 0.20
    answer_correctness: 0.15

concurrency:
  generation_semaphore: 1
  evaluation_semaphore: 3
  batch_size: 4
