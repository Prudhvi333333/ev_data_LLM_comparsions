project_name: domain-qa-benchmark

paths:
  kb: data/kb/GNEM - Auto Landscape Lat Long Updated.xlsx
  questions: data/Human validated 50 questions.xlsx
  output_root: outputs
  generation: outputs/generation
  evaluation: outputs/evaluation
  reports: outputs/reports
  manifests: outputs/manifests
  indexes: outputs/indexes
  logs: outputs/logs
  unused: unused

models:
  qwen:
    provider: ollama
    model_name: qwen2.5:14b
    endpoint: http://127.0.0.1:11435/api/generate
    temperature: 0.1
    max_tokens: 512
    timeout_seconds: 180
    num_ctx: 4096
    top_p: 0.9
    repeat_penalty: 1.05
  gemma:
    provider: ollama
    model_name: gemma3:27b
    endpoint: http://127.0.0.1:11435/api/generate
    temperature: 0.1
    max_tokens: 512
    timeout_seconds: 180
    num_ctx: 4096
    top_p: 0.9
    repeat_penalty: 1.05
  gemini:
    provider: gemini
    model_name: gemini-2.5-flash
    temperature: 0.1
    max_tokens: 512
    timeout_seconds: 180
    top_p: 0.9

retrieval:
  embedding_model: sentence-transformers/all-mpnet-base-v2
  reranker_model: cross-encoder/ms-marco-MiniLM-L-6-v2
  allow_remote_model_downloads: false
  allow_hash_embedding_fallback: true
  dense_dimension: 2048
  top_k_dense: 24
  top_k_sparse: 24
  top_k_fused: 18
  top_k_reranked: 8
  max_context_tokens: 1800
  rrf_k: 60
  chunk_overlap: 0

structured_ops:
  enabled: true
  top_n_default: 5
  max_evidence_rows: 25
  supplier_only_default: true
  employment_field: employment

prompts:
  version: benchmark_v2
  rag_not_found_text: Not found in provided context.
  norag_not_found_text: I do not know based on the closed-book baseline and will not fabricate domain specifics.

evaluation:
  enabled_metrics:
    - faithfulness
    - response_relevancy
    - context_precision
    - context_recall
    - answer_correctness
  provider: gemini
  llm_model: gemini-2.5-flash
  embeddings_provider: gemini
  embeddings_model: models/text-embedding-004
  timeout_seconds: 180
  retries: 2
  raise_exceptions: false
  batch_size: 1
  allow_optional_metrics: true

runtime:
  resume: true
  write_excel: true
  write_csv: true
  fail_fast: false
  random_seed: 7

api_keys:
  gemini: ${GEMINI_API_KEY}
